<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatLab | Studio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="dark studio-page">

    <header class="head">
        <div class="logo">BEAT<span>.SPACE</span></div>
        <nav class="nav">
            <a href="index.html" class="lnk">Главная</a>
            <a href="#" class="lnk active">Студия</a>
        </nav>
        <div class="user">
            <span class="vhod">PRO Mode</span>
        </div>
    </header>

    <main class="studio-workplace">
        
        <aside class="side-bar">
            <div class="tool-head">Инструменты</div>
            <div class="tool-list">
                <div class="tool-item active" onclick="showTool('drums')">🥁 Драм-машина</div>
                <div class="tool-item" onclick="showTool('synth')">🎹 Синтезатор</div>
                <div class="tool-item" onclick="showTool('fx')">🎚 Эффекты</div>
            </div>
        </aside>

        <section class="editor">
            <div class="top-panel">
                <h2 class="proj-name">Новый проект</h2>
                <div class="actions">
                    <label class="btn-upload">
                        Загрузить MP3
                        <input type="file" id="uploadFile" accept="audio/*" hidden>
                    </label>
                </div>
            </div>

            <div class="track-area">
                <div id="waveform"></div>
            </div>

            <div class="pads-container" id="drums-tool">
                <h3 class="tool-title">Drum Pads (1-4)</h3>
                <div class="pads-grid">
                    <div class="pad" data-sound="kick">KICK</div>
                    <div class="pad" data-sound="snare">SNARE</div>
                    <div class="pad" data-sound="hihat">HI-HAT</div>
                    <div class="pad" data-sound="clap">CLAP</div>
                </div>
            </div>

            <div class="control-deck">
                <div class="transport">
                    <button class="btn-icon" id="btnStop">⏹</button>
                    <button class="btn-play-big" id="btnPlay">▶</button>
                </div>

                <div class="fx-group">
                    <label>Громкость</label>
                    <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
                </div>

                <div class="fx-group">
                    <label>Скорость</label>
                    <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
                </div>

                <div class="fx-group">
                    <label>Zoom</label>
                    <input type="range" id="zoom" min="10" max="200" value="50">
                </div>
            </div>
        </section>

    </main>

    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <script src="studio.js"></script>

</body>
</html>
